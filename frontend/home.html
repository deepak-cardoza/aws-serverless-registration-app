<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AWS Serverless App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Profile</h1>
            <p>Your account information</p>
        </div>

        <div class="user-card">
            <h2>Profile Information</h2>
            <div class="user-info">
                <div class="info-row">
                    <span class="info-label">Name:</span>
                    <span class="info-value" id="userName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email:</span>
                    <span class="info-value" id="userEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Phone:</span>
                    <span class="info-value" id="userPhone">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Date of Birth:</span>
                    <span class="info-value" id="userDob">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">User ID:</span>
                    <span class="info-value" id="userId">-</span>
                </div>
            </div>
        </div>

        <button class="btn logout-btn" id="logoutBtn">Logout</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
